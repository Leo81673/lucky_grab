<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TAPE 쿠폰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .coupon-container {
      width: 100%; max-width: 420px;
      padding: 40px 16px;
      margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
    }

    .coupon-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--r-xl);
      padding: 32px 24px;
      text-align: center;
      width: 100%;
      position: relative;
      transition: filter 0.5s ease, opacity 0.5s ease;
    }

    .coupon-card.used {
      filter: grayscale(1);
      opacity: 0.5;
    }

    .coupon-badge {
      display: inline-block;
      background: rgba(245, 166, 35, 0.15);
      color: var(--gold);
      font-size: 12px; font-weight: 600;
      padding: 4px 14px;
      border-radius: var(--r-full);
      margin-bottom: 20px;
    }

    .coupon-prize-title {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .coupon-prize-desc {
      color: var(--text-secondary);
      font-size: 14px; line-height: 1.5;
      margin-bottom: 28px;
    }

    .coupon-timer {
      font-family: var(--font-body);
      font-variant-numeric: tabular-nums;
      font-size: 40px; font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
      transition: color 0.3s ease;
    }

    .coupon-timer.ok { color: var(--gold); }
    .coupon-timer.warning { color: var(--warning); }
    .coupon-timer.urgent { color: var(--error); }
    .coupon-timer.expired { color: var(--text-muted); }

    .coupon-timer-label {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 28px;
    }

    .coupon-use-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(180deg, var(--action) 0%, var(--action-hover) 100%);
      color: white; border: none;
      border-radius: var(--r-full);
      font-family: var(--font-body);
      font-size: 18px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255, 85, 102, 0.35);
      transition: transform 0.1s ease;
    }
    .coupon-use-btn:active:not(:disabled) { transform: scale(0.96); }
    .coupon-use-btn:disabled {
      background: var(--surface-hover);
      color: var(--text-muted);
      box-shadow: none; cursor: not-allowed;
    }

    .coupon-used-stamp {
      display: none;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-12deg);
      font-family: var(--font-display);
      font-size: 32px; font-weight: 900;
      color: var(--text-muted);
      border: 3px solid var(--text-muted);
      padding: 8px 24px;
      border-radius: var(--r-md);
      white-space: nowrap;
    }
    .coupon-card.used .coupon-used-stamp { display: block; }

    .coupon-code {
      font-size: 12px; color: var(--text-dim);
      margin-top: 16px; font-variant-numeric: tabular-nums;
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: skeletonPulse 1.5s ease-in-out infinite;
      border-radius: var(--r-md);
    }
    @keyframes skeletonPulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .skeleton-badge { width: 100px; height: 24px; margin: 0 auto 20px; border-radius: var(--r-full); }
    .skeleton-title { width: 60%; height: 32px; margin: 0 auto 8px; }
    .skeleton-desc { width: 80%; height: 20px; margin: 0 auto 28px; }
    .skeleton-timer { width: 120px; height: 48px; margin: 0 auto 4px; }
    .skeleton-label { width: 80px; height: 16px; margin: 0 auto 28px; }
    .skeleton-btn { width: 100%; height: 54px; border-radius: var(--r-full); }

    /* Error screen */
    .coupon-error {
      text-align: center; padding: 80px 24px;
    }
    .coupon-error-emoji { font-size: 48px; margin-bottom: 16px; }
    .coupon-error-title {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 800; margin-bottom: 8px;
    }
    .coupon-error-desc { color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>
  <div class="coupon-container" id="couponContainer">
    <!-- Skeleton loading state -->
    <div class="brand-header" style="margin-bottom: 24px;">
      <h1 class="brand-name" style="font-size: 32px; letter-spacing: 6px;">TAPE</h1>
    </div>

    <div class="coupon-card" id="couponCard">
      <div id="couponContent">
        <div class="skeleton skeleton-badge"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-desc"></div>
        <div class="skeleton skeleton-timer"></div>
        <div class="skeleton skeleton-label"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>
      <div class="coupon-used-stamp">사용 완료</div>
    </div>
  </div>

  <script type="module" src="js/coupon.js"></script>
</body>
</html>

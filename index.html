<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TAPE × 럭키 그랩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="brand-header">
      <h1 class="brand-name">TAPE</h1>
      <p class="brand-event">× 럭키 그랩</p>
    </div>
    <p class="subtitle">크레인을 움직여 행운의 공을 잡아보세요!</p>

    <div class="machine">
      <div class="machine-top">
        <div class="rail">
          <div class="claw-assembly" id="clawAssembly">
            <div class="claw-rope" id="clawRope"></div>
            <div class="claw-head" id="clawHead">
              <div class="claw-arm left"></div>
              <div class="claw-arm right"></div>
            </div>
            <div class="grabbed-ball" id="grabbedBall"></div>
          </div>
        </div>
      </div>

      <div class="machine-body">
        <div class="ball-pit" id="ballPit"></div>
        <div class="machine-label">TAPE</div>
      </div>

      <div class="machine-base">
        <div class="exit-hole"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btnLeft" aria-label="왼쪽">◀</button>
      <button class="grab-button" id="grabButton">
        <span class="button-text">잡기!</span>
      </button>
      <button class="ctrl-btn" id="btnRight" aria-label="오른쪽">▶</button>
    </div>

    <p class="hint">◀ ▶ 버튼으로 크레인 이동, 잡기 버튼으로 뽑기!</p>

    <div class="toast" id="toast"></div>

    <div class="result-overlay" id="resultOverlay" role="dialog" aria-modal="true">
      <div class="result-card">
        <div class="result-ball" id="resultBall"></div>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="result-desc" id="resultDesc"></p>
        <button class="retry-button" id="retryButton">다시 하기</button>
      </div>
    </div>

    <!-- Landscape orientation warning -->
    <div class="landscape-warning">
      <div class="landscape-icon">📱</div>
      <p>세로로 돌려주세요!</p>
    </div>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
